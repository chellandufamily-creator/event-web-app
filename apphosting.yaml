# Firebase App Hosting — https://firebase.google.com/docs/app-hosting/configure
# Set secrets in Cloud Secret Manager, then reference them here (do not commit real values).
# Or add env vars in Firebase console → App Hosting → your backend → Settings → Environment.

runConfig:
  cpu: 1
  memoryMiB: 1024
  concurrency: 80

